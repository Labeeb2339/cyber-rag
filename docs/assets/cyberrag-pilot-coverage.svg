<desc id="desc">A paired dot plot for 15 cybersecurity questions. Mean keyword coverage rose from 0.627 without retrieval to 0.843 with CyberRAG; context retrieval hit 14 of 15 expected documents and mean latency increased by 2.694 seconds.</desc>
